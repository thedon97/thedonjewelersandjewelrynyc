name: Weekly jewelry catalog sync

on:
  schedule:
    - cron: "0 4 * * 0"
    - cron: "0 5 * * 0"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Run at Sunday midnight New York time
        env:
          SYNC_URL: https://www.thedonjewelersandjewelrynyc.com/api/cron/jewelry-sync
          SYNC_SECRET: ${{ secrets.JEWELRY_SYNC_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(TZ=America/New_York date +'%u-%H')" != "7-00" ]; then
            echo "Skipping duplicate daylight-saving-time schedule."
            exit 0
          fi
          test -n "$SYNC_SECRET"
          curl --fail-with-body --retry 2 \
            -H "Authorization: Bearer $SYNC_SECRET" \
            "$SYNC_URL"
